<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gifts Shop</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
<link rel="stylesheet" href="style.css?v=7">
</head>
<body>

  <div id="loading" class="screen center">
    <div class="spinner"></div>
    <p>Loading your shop…</p>
  </div>

  <div id="error" class="screen center hidden">
    <div class="error-icon">⚠️</div>
    <p id="error-text">Something went wrong.</p>
  </div>

  <div id="app" class="screen hidden">
    <header class="topbar">
      <div class="role-badge" id="role-badge">user</div>
      <div class="brand">
        <div id="shop-logo" class="shop-logo"></div>
        <h1 id="page-title">MagicMall</h1>
      </div>
      <div style="width:52px"></div>
    </header>

    <!-- ── SHOP TAB ───────────────────────────────────────── -->
    <section id="tab-shop" class="tab-content">
      <div id="gift-grid" class="grid"></div>
    </section>

    <button id="cart-fab" class="cart-fab hidden" onclick="openCart()">
      <span id="cart-fab-count">0</span> selected · <span id="cart-fab-price">0</span> ⭐
    </button>

    <!-- ── NFT TO STICKER TAB (everyone) ──────────────────── -->
    <section id="tab-convert" class="tab-content hidden">
      <div class="nft-fetch-box">
        <input id="cv-nft-link" placeholder="Paste NFT link (t.me/nft/Name-123)">
        <button class="btn-primary" style="flex-shrink:0;" onclick="previewConvert()" id="cv-fetch-btn">Preview</button>
      </div>
      <p id="cv-status" class="hint-text"></p>

      <div id="cv-result" class="hidden">
        <div id="cv-anim" class="viewer-anim"></div>
        <h2 id="cv-name" class="viewer-title"></h2>
        <div id="cv-preview-table" class="nft-preview-table"></div>
        <p id="cv-price" class="viewer-price"></p>
        <button class="btn-primary btn-block" id="cv-buy-btn" onclick="buyConvert()">🎟️ Convert to Sticker</button>
      </div>
    </section>

    <!-- ── MY ORDERS TAB (everyone) ───────────────────────── -->
    <section id="tab-orders" class="tab-content hidden">
      <div id="orders-list" class="list"></div>
    </section>

    <!-- ── MANAGE GIFTS TAB (owner/admin) ────────────────── -->
    <section id="tab-gifts" class="tab-content hidden">
      <button class="btn-add-floating" id="nft-pricing-btn" onclick="openNftPricingModal()" style="background:#2a2a35;color:#9fd3ff;">⚙️ Sticker Conversion Pricing</button>
      <button class="btn-add-floating" onclick="openGiftForm()">＋ Add New Gift</button>
      <div id="admin-gift-list" class="list"></div>
    </section>

    <!-- ── MANAGE USERS TAB (owner/admin) ────────────────── -->
    <section id="tab-users" class="tab-content hidden">
      <input id="user-search" class="search-input" placeholder="🔍 Search by user ID or username" oninput="filterUsers()">
      <button class="btn-add-floating" onclick="openAddUserForm()">＋ Add User by ID</button>
      <div id="user-list" class="list"></div>
    </section>

    <!-- ── BOTTOM NAV ─────────────────────────────────────── -->
    <nav class="bottom-nav" id="bottom-nav">
      <button class="nav-btn active" data-tab="shop" onclick="switchTab('shop')">
        <span>🛍️</span><small>Shop</small>
      </button>
      <button class="nav-btn" data-tab="orders" onclick="switchTab('orders')">
        <span>📦</span><small>Orders</small>
      </button>
      <button class="nav-btn" data-tab="convert" onclick="switchTab('convert')">
        <span>🎟️</span><small>Convert</small>
      </button>
      <button class="nav-btn hidden" data-tab="gifts" id="nav-gifts" onclick="switchTab('gifts')">
        <span>🎁</span><small>Gifts</small>
      </button>
      <button class="nav-btn hidden" data-tab="users" id="nav-users" onclick="switchTab('users')">
        <span>👥</span><small>Users</small>
      </button>
    </nav>
  </div>

  <!-- Add/Edit gift modal -->
  <div id="gift-modal" class="modal hidden">
    <div class="modal-card">
      <h2 id="gift-modal-title">Add New Gift</h2>

      <div class="nft-fetch-box">
        <input id="f-nft-link" placeholder="Paste NFT link (t.me/nft/Name-123)">
        <button class="btn-primary" style="flex-shrink:0;" onclick="lookupNft()" id="nft-fetch-btn">Fetch</button>
      </div>
      <p id="nft-fetch-status" class="hint-text"></p>
      <div id="nft-preview-table" class="nft-preview-table hidden"></div>

      <input id="f-name" placeholder="Gift name">
      <input id="f-giftid" placeholder="Telegram Gift API ID">
      <input id="f-emoji" placeholder="Emoji (optional)" value="🎁">
      <input id="f-player-price" type="number" placeholder="Player price (Stars)">
      <input id="f-reseller-price" type="number" placeholder="Reseller price (Stars)">
      <label class="file-label">
        Or upload gift animation (.json) manually <span id="file-label-note"></span>
        <input id="f-file" type="file" accept="application/json">
      </label>
      <div id="preview-box" class="preview-box hidden"></div>
      <div class="modal-actions">
        <button onclick="closeGiftForm()" class="btn-secondary">Cancel</button>
        <button onclick="submitGift()" class="btn-primary" id="gift-submit-btn">Upload</button>
      </div>
      <p id="upload-status"></p>
    </div>
  </div>

  <!-- Role picker modal -->
  <div id="role-modal" class="modal hidden">
    <div class="modal-card">
      <h2>Set Role</h2>
      <p id="role-target-name" class="modal-subtext"></p>
      <div class="role-options" id="role-options"></div>
      <div class="modal-actions">
        <button onclick="closeRoleModal()" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Add user by ID modal -->
  <div id="add-user-modal" class="modal hidden">
    <div class="modal-card">
      <h2>Add User by ID</h2>
      <input id="au-userid" type="number" placeholder="Telegram User ID">
      <div class="role-options" id="au-role-options"></div>
      <div class="modal-actions">
        <button onclick="closeAddUserForm()" class="btn-secondary">Cancel</button>
        <button onclick="submitAddUser()" class="btn-primary">Add</button>
      </div>
      <p id="add-user-status"></p>
    </div>
  </div>

  <!-- NFT conversion pricing modal (owner only) -->
  <div id="nft-pricing-modal" class="modal hidden">
    <div class="modal-card">
      <h2>Sticker Conversion Pricing</h2>
      <p class="modal-subtext">Flat price charged to convert any NFT link into a sticker.</p>
      <input id="np-user-price" type="number" placeholder="User price (Stars)">
      <input id="np-reseller-price" type="number" placeholder="Reseller price (Stars)">
      <div class="modal-actions">
        <button onclick="closeNftPricingModal()" class="btn-secondary">Cancel</button>
        <button onclick="saveNftPricing()" class="btn-primary">Save</button>
      </div>
      <p id="np-status"></p>
    </div>
  </div>

  <!-- Cart modal -->
  <div id="cart-modal" class="modal hidden">
    <div class="modal-card" onclick="event.stopPropagation()">
      <h2 id="cart-title">Your Cart</h2>

      <div id="cart-step-recipient">
        <p class="modal-subtext">Who are these gifts for?</p>
        <button class="btn-primary btn-block" onclick="setCartRecipient(false)">🎁 Myself</button>
        <button class="btn-secondary btn-block" onclick="setCartRecipient(true)">🔗 Someone Else</button>
      </div>

      <div id="cart-step-review" class="hidden">
        <div id="cart-lines" class="cart-lines"></div>
        <div class="cart-footer">
          <span id="cart-total-items">0 gifts</span>
          <span id="cart-total-price">0 ⭐</span>
        </div>
        <button class="btn-primary btn-block" onclick="proceedToCheckout()">Continue</button>
      </div>

      <div id="cart-step-checkout" class="hidden">
        <div id="checkout-lines" class="cart-lines"></div>
        <div class="cart-footer">
          <span id="checkout-total-items">0 gifts</span>
          <span id="checkout-total-price">0 ⭐</span>
        </div>
        <button class="btn-primary btn-block" onclick="payCart()">Pay</button>
      </div>

      <p id="cart-status" class="buy-status"></p>
      <button class="btn-secondary btn-block" onclick="closeCart()">Close</button>
    </div>
  </div>

  <script src="app.js?v=7"></script>
</body>
</html>
